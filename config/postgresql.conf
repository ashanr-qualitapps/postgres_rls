# =============================================================================
# PostgreSQL 16 – beauty_app custom configuration
# =============================================================================

# ── Connection ────────────────────────────────────────────────────────────────
listen_addresses = '*'
max_connections = 100
port = 5432

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

# ── WAL & Checkpoints ─────────────────────────────────────────────────────────
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# ── Query Planner ─────────────────────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200

# ── Row Level Security ────────────────────────────────────────────────────────
# row_security is ON by default in PostgreSQL 9.5+
# Policies are enforced for all roles except superusers and table owners
# unless FORCE ROW LEVEL SECURITY is set on the table.
row_security = on

# ── Logging ───────────────────────────────────────────────────────────────────
logging_collector = off
log_destination = 'stderr'
log_min_duration_statement = 1000      # log queries taking > 1 s
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

# ── Locale ────────────────────────────────────────────────────────────────────
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
datestyle = 'iso, mdy'
timezone = 'UTC'
